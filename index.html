<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angry Birds</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        #loading-screen {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:#0a0806; display:flex; flex-direction:column;
            align-items:center; justify-content:center; z-index:999;
        }
        #loading-screen .spinner {
            width:48px; height:48px; border:4px solid rgba(192,57,43,0.2);
            border-top-color:#c0392b; border-radius:50%;
            animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loading-screen p {
            color:#c0392b; font:bold 22px Arial; margin-top:18px;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p>LOADING</p>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay" class="hidden">
            <div id="score-display">Score: 0</div>
            <div id="birds-remaining">Birds: 0</div>
            <div id="level-info"></div>
        </div>
        <button id="btn-explode" class="hidden">💥 EXPLODE</button>
        <div id="arm-indicator"></div>

        <div id="complete-overlay">
            <div id="complete-card">
                <h2>Level Complete!</h2>
                <p id="complete-score">Score: 0</p>
                <div id="complete-buttons">
                    <button id="btn-next-level" class="overlay-btn green">Next Level</button>
                    <button id="btn-menu" class="overlay-btn blue">Menu</button>
                </div>
            </div>
        </div>

        <div id="gameover-overlay">
            <div id="gameover-card">
                <h2>Game Over</h2>
                <p id="gameover-score">Score: 0</p>
                <div id="gameover-buttons">
                    <button id="btn-retry" class="overlay-btn red">Retry</button>
                    <button id="btn-menu-go" class="overlay-btn blue">Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>if (typeof Matter === 'undefined') document.write('<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"><\/script>');</script>
    <script src="js/game.js"></script>
</body>
</html>
